
# dbt_project.yml
# This file tells dbt how your project is structured
# and where to write output tables in Snowflake

name: 'dbt_fred'
version: '1.0.0'

profile: 'dbt_fred'   # matches the profile name in ~/.dbt/profiles.yml

# Where to find your models, tests, etc.
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

# Clean these folders when running dbt clean
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Recession signal thresholds (tunable without editing model SQL)
  sahm_rule_threshold: 0.50          # pp rise in 3-mo avg unemployment vs 12-mo low
  high_inflation_threshold: 5.0      # YoY CPI % above which signal triggers
  low_sentiment_threshold: 60        # Michigan sentiment index floor
  fed_tightening_threshold: 1.0      # pp YoY increase in fed funds rate

# ============================================
# Model Configuration
# This maps folder structure → Snowflake schemas
# ============================================
models:
  dbt_fred:

    # models/staging/ → writes to FRED_PIPELINE.STAGING schema
    staging:
      +schema: STAGING
      +materialized: view    # staging models are views (lightweight, always fresh)

    # models/intermediate/ → writes to FRED_PIPELINE.INTERMEDIATE schema
    intermediate:
      +schema: INTERMEDIATE
      +materialized: view    # intermediate models are views too

    # models/marts/ → writes to FRED_PIPELINE.MARTS schema
    marts:
      +schema: MARTS
      +materialized: table   # mart models are tables (faster for dashboards)